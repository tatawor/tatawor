<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تم اكتشاف تلاعب</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* تأثير الوميض الأحمر */
        .alert-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.2) 0%, transparent 70%);
            animation: flash 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes flash {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* خطوط حمراء متحركة */
        .scan-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(239, 68, 68, 0.03) 2px,
                rgba(239, 68, 68, 0.03) 4px
            );
            pointer-events: none;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        /* المحتوى الرئيسي */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            width: 100%;
        }

        /* أيقونة التحذير */
        .warning-icon {
            width: 25vh;
            height: 25vh;
            max-width: 250px;
            max-height: 250px;
            margin: 0 auto 5vh;
            position: relative;
            animation: shake 0.5s ease-in-out infinite;
        }

        .warning-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #ef4444;
            border-radius: 50%;
            animation: pulse-ring 2s ease-out infinite;
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.5);
        }

        .warning-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16vh;
            height: 16vh;
            max-width: 160px;
            max-height: 160px;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8vh;
            box-shadow: 0 0 50px rgba(220, 38, 38, 0.8);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* نص التحذير */
        .warning-title {
            font-size: 6vh;
            font-weight: 900;
            color: #ef4444;
            margin-bottom: 3vh;
            text-shadow: 0 0 30px rgba(239, 68, 68, 0.8);
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 30px rgba(239, 68, 68, 0.8); }
            50% { text-shadow: -2px 0 #ff0000, 2px 0 #00ff00; }
        }

        .warning-text {
            font-size: 2.5vh;
            color: #fca5a5;
            margin-bottom: 2vh;
            line-height: 1.8;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .warning-sub {
            font-size: 2vh;
            color: #7f1d1d;
            margin-bottom: 6vh;
            font-weight: 700;
        }

        /* زر الخروج */
        .exit-btn {
            padding: 2.5vh 8vh;
            background: transparent;
            border: 3px solid #ef4444;
            border-radius: 50px;
            color: #ef4444;
            font-family: 'Tajawal', sans-serif;
            font-size: 2.5vh;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            animation: border-pulse 2s infinite;
        }

        .exit-btn:hover {
            background: #ef4444;
            color: #000;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.6);
        }

        @keyframes border-pulse {
            0%, 100% { border-color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
            50% { border-color: #dc2626; box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); }
        }

        /* تأثير الضوء الأحمر المتحرك */
        .red-glow {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(239, 68, 68, 0.1) 0%, transparent 50%);
            pointer-events: none;
            animation: glow-move 4s ease-in-out infinite;
        }

        @keyframes glow-move {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* خطوط زخرفية حمراء */
        .lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ef4444, transparent);
            animation: line-move 3s ease-in-out infinite;
        }

        .line:nth-child(1) { top: 20%; width: 100%; animation-delay: 0s; }
        .line:nth-child(2) { top: 80%; width: 80%; left: 10%; animation-delay: 1s; }
        .line:nth-child(3) { top: 50%; width: 60%; left: 20%; animation-delay: 2s; }

        @keyframes line-move {
            0%, 100% { opacity: 0; transform: translateX(-100%); }
            50% { opacity: 1; transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <!-- التأثيرات الخلفية -->
    <div class="alert-flash"></div>
    <div class="red-glow"></div>
    <div class="scan-lines"></div>
    
    <div class="lines">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <!-- المحتوى -->
    <div class="content">
        <!-- أيقونة التحذير -->
        <div class="warning-icon">
            <div class="warning-circle"></div>
            <div class="warning-inner">⚠️</div>
        </div>

        <!-- النصوص -->
        <h1 class="warning-title">تم اكتشاف تلاعب!</h1>
        <p class="warning-text">
            تم رصد محاولة تعديل أو اختراق التطبيق. هذا انتهاك صارخ لشروط الاستخدام.
        </p>
        <p class="warning-sub">
            تم تسجيل بيانات الجهاز والمستخدم. الإجراءات القانونية قد تتخذ.
        </p>

        <!-- زر الخروج -->
        <button class="exit-btn" onclick="closeApp()">
            إغلاق التطبيق
        </button>
    </div>

    <script>
        // منع الرجوع
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };

        // منع فتح قائمة السياق
        document.addEventListener('contextmenu', event => event.preventDefault());

        // منع F12 و DevTools
        document.addEventListener('keydown', function(e) {
            if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });

        // دالة إغلاق التطبيق
        function closeApp() {
            // في Android: إغلاق التطبيق
            if (typeof Android !== 'undefined') {
                Android.closeApp();
            } else {
                // للمتصفح: محاولة إغلاق النافذة
                window.close();
                // إذا فشل، إظهار رسالة
                document.body.innerHTML = '<div style="color:#ef4444;text-align:center;padding:50px;font-size:3vh;font-family:Tajawal;">تم حظر الوصول</div>';
            }
        }

        // تسجيل محاولة الاختراق (إرسال للسيرفر)
        function logIntrusion() {
            const data = {
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`
            };
            
            // إرسال للسيرفر (استبدل بالرابط الخاص بك)
            // fetch('https://your-server.com/log', {
            //     method: 'POST',
            //     body: JSON.stringify(data)
            // });
            
            console.log('Intrusion attempt logged:', data);
        }

        // تسجيل عند فتح الصفحة
        logIntrusion();
    </script>
</body>
</html>

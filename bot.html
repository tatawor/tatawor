<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>إيڤو - EVO</title>

<style>
:root {
  --ios-bg: #F2F2F7;
  --ios-blue: #007AFF;
  --ios-indigo: #5856D6;
  --ios-green: #34C759;
  --ios-orange: #FF9500;
  --ios-pink: #FF2D55;
  --ios-purple: #AF52DE;
  --ios-red: #FF3B30;
  --ios-gray: #8E8E93;
  --ios-gray2: #636366;
  --ios-gray3: #C7C7CC;
  --ios-gray5: #F2F2F7;
  --ios-text: #1C1C1E;
  --safe-area-top: env(safe-area-inset-top);
  --safe-area-bottom: env(safe-area-inset-bottom);
  --ios-blur: blur(20px) saturate(180%);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'Tajawal', sans-serif;
  background: linear-gradient(180deg, #F5F7FA 0%, #E8ECF1 50%, #F0F4F8 100%);
  color: var(--ios-text);
}

.animated-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(circle at 20% 80%, rgba(0,122,255,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(88,86,214,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
}

.chat {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  width: 100%;
  position: relative;
  background: rgba(255,255,255,0.3);
}

/* Header */
.header {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: var(--ios-blur);
  padding: 16px 20px;
  padding-top: calc(16px + var(--safe-area-top));
  border-bottom: 0.5px solid rgba(0,0,0,0.08);
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.05);
}

.header-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--ios-blue) 0%, var(--ios-indigo) 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 15px rgba(0,122,255,0.3);
  color: white;
}

.header-text {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(90deg, var(--ios-blue) 0%, var(--ios-indigo) 50%, var(--ios-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.status-container {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(52, 199, 89, 0.1);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(52, 199, 89, 0.2);
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--ios-green);
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(52, 199, 89, 0.6);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.9); }
}

/* Messages Container */
.messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
  padding-bottom: calc(100px + var(--safe-area-bottom));
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

/* Message Bubbles */
.msg {
  width: 100%;
  max-width: 100%;
  padding: 18px;
  border-radius: 20px;
  font-size: 15px;
  line-height: 1.6;
  position: relative;
  animation: messageSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  word-wrap: break-word;
  transition: all 0.3s ease;
}

@keyframes messageSlide {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.user {
  background: linear-gradient(135deg, var(--ios-blue) 0%, var(--ios-indigo) 100%);
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 6px;
  box-shadow: 0 6px 20px rgba(0,122,255,0.25);
  text-align: right;
  max-width: 85%;
  margin-left: auto;
}

.bot {
  background: rgba(255, 255, 255, 0.98);
  color: var(--ios-text);
  align-self: flex-start;
  border-bottom-left-radius: 6px;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: var(--shadow-sm);
  text-align: right;
  max-width: 95%;
  margin-right: auto;
}

.bot-time {
  font-size: 11px;
  color: var(--ios-gray);
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Section Title inside message */
.section-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--ios-text);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.section-desc {
  color: var(--ios-gray);
  font-size: 14px;
  margin-bottom: 16px;
  font-weight: 500;
  line-height: 1.5;
}

/* Breadcrumb */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--ios-gray);
  flex-wrap: wrap;
  padding: 10px 14px;
  background: var(--ios-gray5);
  border-radius: 12px;
  width: fit-content;
}

.breadcrumb-item {
  color: var(--ios-blue);
  cursor: pointer;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: 8px;
  transition: all 0.2s;
}

.breadcrumb-item:hover {
  background: rgba(0,122,255,0.1);
}

.breadcrumb-separator {
  color: var(--ios-gray3);
  font-weight: 700;
}

/* Grid System - 2 cards per row */
.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  width: 100%;
}

/* Expandable Cards System */
.expandable-card {
  background: rgba(255,255,255,0.9);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: var(--shadow-sm);
  width: 100%;
}

.expandable-card:hover {
  box-shadow: var(--shadow-md);
}

.card-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 16px 12px;
  cursor: pointer;
  background: rgba(255,255,255,0.95);
  transition: all 0.2s ease;
  user-select: none;
  touch-action: manipulation;
  position: relative;
  text-align: center;
}

.card-header:active {
  background: rgba(0,122,255,0.05);
}

.card-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--ios-blue), var(--ios-indigo));
  opacity: 0;
  transition: opacity 0.3s;
}

.card-header:hover::before,
.card-header.active::before {
  opacity: 1;
}

.card-icon {
  width: 60px;
  height: 60px;
  border-radius: 16px;
  object-fit: cover;
  background: linear-gradient(135deg, rgba(0,122,255,0.1), rgba(88,86,214,0.05));
  flex-shrink: 0;
}

.card-info {
  width: 100%;
  text-align: center;
}

.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--ios-text);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}

.card-subtitle {
  font-size: 12px;
  color: var(--ios-gray);
  font-weight: 500;
  line-height: 1.4;
}

.card-arrow {
  font-size: 18px;
  color: var(--ios-gray3);
  transition: all 0.3s ease;
  margin-top: 4px;
}

/* Item Card (Leaf Node) */
.item-card {
  background: rgba(255,255,255,0.95);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 14px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  touch-action: manipulation;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.item-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--ios-green), var(--ios-blue));
  opacity: 0;
  transition: opacity 0.3s;
}

.item-card:hover::before,
.item-card:active::before {
  opacity: 1;
}

.item-card:active {
  transform: scale(0.98);
  box-shadow: 0 4px 15px rgba(0,122,255,0.15);
}

.item-image {
  width: 100%;
  height: 100px;
  border-radius: 12px;
  object-fit: cover;
  margin-bottom: 10px;
  background: linear-gradient(135deg, rgba(0,122,255,0.1), rgba(0,122,255,0.05));
  pointer-events: none;
}

.item-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--ios-text);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}

.item-desc {
  font-size: 12px;
  color: var(--ios-gray);
  line-height: 1.4;
  margin-bottom: 8px;
}

.item-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}

.item-badge {
  background: rgba(0,122,255,0.1);
  color: var(--ios-blue);
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}

/* Download Section (Auto-sent) */
.download-section {
  background: linear-gradient(135deg, rgba(0,122,255,0.05) 0%, rgba(88,86,214,0.05) 100%);
  border: 1px solid rgba(0,122,255,0.1);
  border-radius: 16px;
  padding: 20px;
  margin-top: 12px;
  text-align: center;
  animation: fadeInUp 0.4s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.download-preview {
  width: 100%;
  height: 200px;
  border-radius: 16px;
  object-fit: cover;
  margin-bottom: 16px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.download-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--ios-text);
  margin-bottom: 8px;
}

.download-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.download-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 32px;
  background: linear-gradient(135deg, var(--ios-blue) 0%, var(--ios-indigo) 100%);
  color: white;
  text-decoration: none;
  border-radius: 24px;
  font-size: 16px;
  font-weight: 700;
  box-shadow: 0 6px 20px rgba(0,122,255,0.3);
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
  width: 100%;
  max-width: 300px;
}

.download-btn:hover, .download-btn:active {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0,122,255,0.4);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 30px 20px;
  background: rgba(255,255,255,0.8);
  border-radius: 16px;
  border: 2px dashed var(--ios-gray3);
}

.empty-state-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.5;
}

.empty-state-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--ios-gray);
}

/* Back Button */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 16px;
  padding: 12px 20px;
  background: var(--ios-gray5);
  color: var(--ios-blue);
  border: none;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.back-btn:hover, .back-btn:active {
  background: var(--ios-blue);
  color: white;
  transform: translateX(-4px);
}

/* Input Area */
.input-container {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: var(--ios-blur);
  border-top: 1px solid rgba(0,0,0,0.08);
  padding: 16px 20px;
  padding-bottom: calc(16px + var(--safe-area-bottom));
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
  z-index: 50;
}

.input-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
}

.input-box {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--ios-gray5);
  border-radius: 28px;
  padding: 8px;
  padding-left: 16px;
  border: 2px solid transparent;
  transition: all 0.3s ease;
  flex: 1;
  min-width: 0;
}

.input-box:focus-within {
  background: rgba(255,255,255,1);
  border-color: var(--ios-blue);
  box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
}

input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--ios-text);
  font-size: 16px;
  padding: 10px;
  outline: none;
  font-family: inherit;
  min-width: 0;
}

input::placeholder {
  color: var(--ios-gray);
  font-weight: 500;
}

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--ios-blue) 0%, var(--ios-indigo) 100%);
  color: white;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 4px 15px rgba(0,122,255,0.3);
}

.send-btn:active {
  transform: scale(0.9);
}

/* Toast */
.toast {
  position: fixed;
  top: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 14px 24px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  z-index: 1000;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  backdrop-filter: blur(10px);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Typing */
.typing {
  display: flex;
  gap: 6px;
  padding: 20px;
  background: rgba(255,255,255,0.98);
  border-radius: 20px;
  align-self: flex-start;
  border-bottom-left-radius: 6px;
  width: auto;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: var(--shadow-sm);
  align-items: center;
  margin-bottom: 8px;
}

.typing-dot {
  width: 10px;
  height: 10px;
  background: linear-gradient(135deg, var(--ios-blue), var(--ios-purple));
  border-radius: 50%;
  animation: typingBounce 1.4s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-8px); }
}

/* Scrollbar */
.messages::-webkit-scrollbar {
  width: 6px;
}

.messages::-webkit-scrollbar-track {
  background: transparent;
}

.messages::-webkit-scrollbar-thumb {
  background: var(--ios-gray3);
  border-radius: 3px;
}

/* ===================== MODAL SYSTEM ===================== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal-sheet {
  background: #F2F2F7;
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  overflow: hidden;
}

.modal-overlay.open .modal-sheet {
  transform: translateY(0);
}

.modal-handle {
  width: 40px;
  height: 5px;
  background: rgba(0,0,0,0.2);
  border-radius: 3px;
  margin: 12px auto 0;
  flex-shrink: 0;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
}

.modal-title-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}

.modal-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  object-fit: cover;
}

.modal-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--ios-text);
}

.modal-subtitle {
  font-size: 13px;
  color: var(--ios-gray);
  font-weight: 500;
  margin-top: 2px;
}

.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,0.08);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--ios-gray2);
  transition: all 0.2s;
  flex-shrink: 0;
}

.modal-close:hover {
  background: rgba(255,59,48,0.15);
  color: var(--ios-red);
}

.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  overscroll-behavior: contain;
}

/* Breadcrumb inside modal */
.modal-breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 14px;
  font-size: 12px;
  flex-wrap: wrap;
  padding: 8px 12px;
  background: rgba(255,255,255,0.8);
  border-radius: 10px;
}

.modal-breadcrumb-item {
  color: var(--ios-blue);
  cursor: pointer;
  font-weight: 600;
}

.modal-breadcrumb-sep {
  color: var(--ios-gray3);
}

.modal-breadcrumb-current {
  color: var(--ios-text);
  font-weight: 700;
}

/* Sub-category list in modal */
.modal-section-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--ios-gray);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 12px 0 8px;
}

.modal-sub-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.modal-sub-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.95);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid rgba(0,0,0,0.05);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

.modal-sub-item:active {
  transform: scale(0.98);
  background: rgba(0,122,255,0.05);
}

.modal-sub-img {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}

.modal-sub-info {
  flex: 1;
  min-width: 0;
}

.modal-sub-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--ios-text);
}

.modal-sub-desc {
  font-size: 12px;
  color: var(--ios-gray);
  margin-top: 2px;
}

.modal-sub-arrow {
  color: var(--ios-gray3);
  font-size: 18px;
  flex-shrink: 0;
}

/* Items grid in modal */
.modal-items-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.modal-item-card {
  background: rgba(255,255,255,0.95);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 14px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.modal-item-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--ios-green), var(--ios-blue));
  opacity: 0;
  transition: opacity 0.3s;
}

.modal-item-card:hover::before,
.modal-item-card:active::before {
  opacity: 1;
}

.modal-item-card:active {
  transform: scale(0.97);
}

.modal-item-img {
  width: 100%;
  height: 90px;
  border-radius: 10px;
  object-fit: cover;
  margin-bottom: 8px;
}

.modal-item-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--ios-text);
  margin-bottom: 3px;
}

.modal-item-desc {
  font-size: 11px;

  line-height: 1.4;
  margin-bottom: 6px;
}

.modal-item-meta {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
}

/* Responsive */
@media (max-width: 380px) {
  .grid-2 {
    gap: 10px;
  }
  
  .card-icon {

    height: 50px;
  }
  
  .card-title {

}

// ==================== المتغيرات العامة ====================

const messagesContainer = document.getElementById("messages");
const input = document.getElementById("input");
const toast = document.getElementById("toast");

// Modal state
let modalHistory = [];

// ==================== الدوال الأساسية ====================

function init() {
  setTimeout(() => {
    sendWelcomeMessage();
  }, 500);
  
  setupEventListeners();
}

function sendWelcomeMessage() {
  const html = `
    <div class="section-title">👋 مرحبًا بك في إيڤو</div>
    <div class="section-desc">اختر أحد الأقسام الأربعة الرئيسية:</div>
    <div class="grid-2" id="main-categories">
      ${generateMainCategoryCards()}
    </div>
  `;
  addMessage(html, 'bot');
  scrollToBottom();
}

function generateMainCategoryCards() {
  const children = store.root.children;
  return Object.entries(children).map(([key, child]) => {
    const hasContent = hasAnyContent(child);
    const count = getTotalCount(child);
    
    return `
      <div class="expandable-card" data-key="${key}" data-path="root.${key}" data-has-content="${hasContent}">
        <div class="card-header" onclick="handleCardClick('root.${key}', this)">
          <img src="${child.image}" class="card-icon" alt="${child.name}">
          <div class="card-info">
            <div class="card-title">
              ${child.name}
              ${!hasContent ? '<span style="font-size:10px; color:var(--ios-red); background:rgba(255,59,48,0.1); padding:2px 6px; border-radius:8px;">فارغ</span>' : ''}
            </div>
            <div class="card-subtitle">${child.desc}</div>
            <div class="card-subtitle" style="color:var(--ios-blue); font-weight:600;">${count} عنصر</div>
          </div>
          <div class="card-arrow">›</div>
        </div>
      </div>
    `;
  }).join('');
}

function hasAnyContent(node) {
  if (node.items && node.items.length > 0) return true;
  if (node.children) {
    for (const child of Object.values(node.children)) {
      if (hasAnyContent(child)) return true;
    }
  }
  return false;
}

function getTotalCount(node) {
  let count = 0;
  if (node.items) count += node.items.length;
  if (node.children) {
    for (const child of Object.values(node.children)) {
      count += getTotalCount(child);
    }
  }
  return count;
}

// ==================== نظام التنقل الموحد ====================

function handleCardClick(path, headerElement) {
  const card = headerElement.closest('.expandable-card');
  const hasContent = card.dataset.hasContent === 'true';
  
  if (!hasContent) {
    showToast('⚠️ هذا القسم فارغ');
    headerElement.style.background = 'rgba(255,59,48,0.05)';
    setTimeout(() => headerElement.style.background = '', 300);
    return;
  }

  // جميع الأقسام الرئيسية تفتح في Modal الآن لضمان أفضل تجربة مستخدم
  openModal(path);
}

// ==================== نظام الـ Modal ====================

function openModal(path) {
  modalHistory = [path];
  renderModal(path);
  
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  
  showToast(`📂 ${getCategoryName(path)}`);
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  modalHistory = [];
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    closeModal();
  }
}

function navigateModalTo(path) {
  modalHistory.push(path);
  renderModal(path);
}

function modalGoBack() {
  if (modalHistory.length > 1) {
    modalHistory.pop();
    const prevPath = modalHistory[modalHistory.length - 1];
    renderModal(prevPath);
  } else {
    closeModal();
  }
}

function renderModal(path) {
  const category = getCategoryByPath(path);
  if (!category) return;

  document.getElementById('modalIcon').src = category.image;
  document.getElementById('modalTitle').textContent = category.name;
  document.getElementById('modalSubtitle').textContent = category.desc;

  const body = document.getElementById('modalBody');
  let html = '';

  html += buildModalBreadcrumb(path);

  if (modalHistory.length > 1) {
    html += `<button onclick="modalGoBack()" style="
      display:inline-flex; align-items:center; gap:6px;
      margin-bottom:12px; padding:8px 16px;
      background:rgba(0,122,255,0.1); color:var(--ios-blue);
      border:none; border-radius:20px; font-size:13px; font-weight:700;
      cursor:pointer; font-family:inherit;
    ">‹ رجوع</button>`;
  }

  if (category.children && Object.keys(category.children).length > 0) {
    html += `<div class="modal-section-label">الأقسام</div>`;
    html += `<div class="modal-sub-list">`;
    html += Object.entries(category.children).map(([key, child]) => {
      const hasContent = hasAnyContent(child);
      const count = getTotalCount(child);
      const childPath = `${path}.${key}`;
      return `
        <div class="modal-sub-item" onclick="${hasContent ? `navigateModalTo('${childPath}')` : `showToast('⚠️ هذا القسم فارغ')`}">
          <img src="${child.image}" class="modal-sub-img" alt="${child.name}">
          <div class="modal-sub-info">
            <div class="modal-sub-name">${child.name}</div>
            <div class="modal-sub-desc">${hasContent ? count + ' عنصر' : 'فارغ'}</div>
          </div>
          <div class="modal-sub-arrow">${hasContent ? '›' : '✕'}</div>
        </div>
      `;
    }).join('');
    html += `</div>`;
  }

  if (category.items && category.items.length > 0) {
    html += `<div class="modal-section-label">المنتجات المتاحة</div>`;
    html += `<div class="modal-items-grid">`;
    html += category.items.map((item, index) => `
      <div class="modal-item-card" onclick="selectItemFromModal('${path}', ${index})">
        <img src="${item.image}" class="modal-item-img" alt="${item.name}">
        <div class="modal-item-name">${item.name}</div>
        <div class="modal-item-desc">${item.desc.substring(0, 35)}${item.desc.length > 35 ? '...' : ''}</div>
        <div class="modal-item-meta">
          <span class="item-badge">${item.size}</span>
          ${item.format ? `<span class="item-badge" style="background:rgba(175,82,222,0.1);color:var(--ios-purple);">${item.format}</span>` : ''}
        </div>
      </div>
    `).join('');
    html += `</div>`;
  }

  if ((!category.children || Object.keys(category.children).length === 0) && (!category.items || category.items.length === 0)) {
    html += `
      <div class="empty-state" style="margin-top:20px;">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">هذا القسم فارغ حالياً</div>
      </div>
    `;
  }

  body.innerHTML = html;
  body.scrollTop = 0;
}

function buildModalBreadcrumb(path) {
  const parts = path.split('.');
  let html = '<div class="modal-breadcrumb">';
  let currentPath = '';

  parts.forEach((part, index) => {
    currentPath += (index > 0 ? '.' : '') + part;
    const cat = getCategoryByPath(currentPath);
    if (!cat) return;

    if (index > 0) html += '<span class="modal-breadcrumb-sep">›</span>';

    const isLast = index === parts.length - 1;
    if (isLast) {
      html += `<span class="modal-breadcrumb-current">${cat.name}</span>`;
    } else {
      const targetPath = currentPath;
      html += `<span class="modal-breadcrumb-item" onclick="navigateModalToFromBreadcrumb('${targetPath}')">${cat.name}</span>`;
    }
  });

  html += '</div>';
  return html;
}

function navigateModalToFromBreadcrumb(path) {
  const idx = modalHistory.indexOf(path);
  if (idx !== -1) {
    modalHistory = modalHistory.slice(0, idx + 1);
  } else {
    modalHistory.push(path);
  }
  renderModal(path);
}

function selectItemFromModal(path, index) {
  closeModal();
  selectItem(path, index);
}

// ==================== اختيار منتج ====================

function selectItem(path, index) {
  const category = getCategoryByPath(path);
  if (!category || !category.items || !category.items[index]) {
    console.error('Item not found:', path, index);
    return;
  }
  
  const item = category.items[index];
  
  addMessage(`📥 طلب تحميل: ${item.name}`, 'user');
  showTyping();
  
  setTimeout(() => {
    hideTyping();
    sendDownloadMessage(item, path);
  }, 800);
}

function sendDownloadMessage(item, path) {
  const breadcrumb = generateBreadcrumb(path);
  const format = item.format ? `<span class="item-badge">${item.format}</span>` : '';
  
  const html = `
    <div class="breadcrumb">${breadcrumb}</div>
    <div class="download-section">
      <img src="${item.image}" class="download-preview" alt="${item.name}">
      <div class="download-title">${item.name}</div>
      <div class="download-meta">
        <span class="item-badge">${item.size}</span>
        ${format}
        <span class="item-badge" style="background:rgba(52,199,89,0.1); color:var(--ios-green);">✓ متوفر</span>
      </div>
      <a href="${item.url}" class="download-btn" target="_blank" onclick="showToast('⬇️ جاري فتح رابط التحميل...')">
        <span>⬇️</span>
        <span>تحميل الآن</span>
      </a>
    </div>
  `;
  
  addMessage(html, 'bot');
  scrollToBottom();
}

function generateBreadcrumb(path) {
  const parts = path.split('.');
  let html = '';
  let currentPath = '';
  
  parts.forEach((part, index) => {
    currentPath += (index > 0 ? '.' : '') + part;
    const category = getCategoryByPath(currentPath);
    if (category) {
      if (index > 0) html += '<span class="breadcrumb-separator">›</span>';
      html += `<span class="breadcrumb-item" onclick="showToast('🧭 ${category.name}')">${category.name}</span>`;
    }
  });
  
  return html;
}

function getCategoryByPath(path) {
  const parts = path.split('.');
  let current = store;
  
  for (const part of parts) {
    if (current[part]) {
      current = current[part];
    } else if (current.children && current.children[part]) {
      current = current.children[part];
    } else {
      console.error('Path not found:', path, 'at part:', part);
      return null;
    }
  }
  return current;
}

function getCategoryName(path) {
  const category = getCategoryByPath(path);
  return category ? category.name : path;
}

// ==================== إدارة الرسائل ====================

function addMessage(html, type) {
  const msg = document.createElement('div');
  msg.className = `msg ${type}`;
  msg.innerHTML = html;
  
  if (type === 'bot') {
    const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
    const timeDiv = document.createElement('div');
    timeDiv.className = 'bot-time';
    timeDiv.innerHTML = `<span>✓✓</span> ${time}`;
    msg.appendChild(timeDiv);
  }
  
  messagesContainer.appendChild(msg);
  scrollToBottom();
}

function showTyping() {
  hideTyping();
  
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.id = 'typing-indicator';
  typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  messagesContainer.appendChild(typing);
  scrollToBottom();
}

function hideTyping() {
  const typing = document.getElementById('typing-indicator');
  if (typing) typing.remove();
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

function scrollToBottom() {
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// ==================== البحث ====================

function setupEventListeners() {
  const sendBtn = document.getElementById('sendBtn');
  
  sendBtn.addEventListener('click', handleUserInput);
  
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleUserInput();
  });
  
  input.addEventListener('focus', () => {
    setTimeout(scrollToBottom, 300);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });
}

function handleUserInput() {
  const text = input.value.trim();
  if (!text) return;
  
  addMessage(text, 'user');
  input.value = '';
  
  showTyping();
  setTimeout(() => {
    hideTyping();
    processSearch(text);
  }, 600);
}

function processSearch(query) {
  const results = searchInStore(query);
  
  if (results.length === 0) {
    const html = `
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-text">لا توجد نتائج لـ "${query}"</div>
        <button class="back-btn" onclick="resetChat()">↩️ العودة للرئيسية</button>
      </div>
    `;
    addMessage(html, 'bot');
  } else {
    let html = `<div class="section-title">🔍 نتائج البحث: "${query}"</div>`;
    html += '<div class="grid-2">';
    html += results.map(result => `
      <div class="item-card" onclick="selectItemByPath('${result.path}', ${result.index})">
        <img src="${result.item.image}" class="item-image" alt="${result.item.name}">
        <div class="item-name">${result.item.name}</div>
        <div class="item-desc">${result.item.desc}</div>
        <div class="item-meta">
          <span class="item-badge">${result.item.size}</span>
        </div>
      </div>
    `).join('');
    html += '</div>';
    addMessage(html, 'bot');
  }
  
  scrollToBottom();
}

function selectItemByPath(path, index) {
  selectItem(path, index);
}

function searchInStore(query) {
  const results = [];
  const lowerQuery = query.toLowerCase();
  
  function searchNode(node, path) {
    if (node.items) {
      node.items.forEach((item, index) => {
        if (item.name.toLowerCase().includes(lowerQuery) || 
            item.desc.toLowerCase().includes(lowerQuery)) {
          results.push({ item, path, index });
        }
      });
    }
    
    if (node.children) {
      Object.entries(node.children).forEach(([key, child]) => {
        searchNode(child, path ? `${path}.${key}` : key);
      });
    }
  }
  
  searchNode(store.root, 'root');
  return results.slice(0, 6);
}

function resetChat() {
  messagesContainer.innerHTML = '';
  sendWelcomeMessage();
}

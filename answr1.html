<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الأسئلة الأكاديمي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .timer-display {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .timer-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .timer-value {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 15px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            margin-top: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .expired-message {
            display: none;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .expired-message.show {
            display: block;
        }

        .expired-message h2 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .expired-message p {
            font-size: 16px;
            line-height: 1.6;
        }

        .expired-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .success-message {
            display: none;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            display: none;
            color: #e74c3c;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            
            .timer-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 نظام الإجابة الأكاديمي</h1>
        <p class="subtitle">أدخل بياناتك قبل انتهاء الوقت المحدد</p>

        <div class="timer-display" id="timerDisplay">
            <div class="timer-label">الوقت المتبقي</div>
            <div class="timer-value" id="countdown">00:00:00:00</div>
        </div>

        <div id="answerForm">
            <div class="form-group">
                <label for="academicId">الرقم الأكاديمي</label>
                <input 
                    type="number" 
                    id="academicId" 
                    placeholder="أدخل رقمك الأكاديمي"
                >
            </div>

            <div class="form-group">
                <label for="answer">الجواب</label>
                <input 
                    type="text" 
                    id="answer" 
                    placeholder="أدخل إجابتك هنا"
                >
            </div>

            <button type="button" class="submit-btn" id="sendBtn">
                إرسال الإجابة
            </button>
            
            <div class="success-message" id="successMsg"></div>
            <div class="error-message" id="errorMsg"></div>
        </div>

        <div class="expired-message" id="expiredMessage">
            <div class="expired-icon">⏰</div>
            <h2>انتهت فترة السؤال</h2>
            <p>
                يتم حالياً مراجعة الأجوبة وسيتم إرسال نجمة ⭐ لأصحاب الإجابات الصحيحة
                <br><br>
                شكراً لمشاركتك!
            </p>
        </div>
    </div>

    <script>
        // ==================== إعدادات المؤقت (تعديل هنا) ====================
        const TIMER_DAYS = 3;      // عدد الأيام
        const TIMER_HOURS = 0;     // عدد الساعات  
        const TIMER_MINUTES = 0;   // عدد الدقائق
        
        // ==================== إعدادات البوت الجديد ====================
        const TELEGRAM_BOT_TOKEN = "8597618866:AAHY2RX2127wGcaCw81p91bynMEUuc71YeQ";
        const TELEGRAM_CHAT_ID = "-1003862952320";
        
        // عناصر الصفحة
        const academicIdInput = document.getElementById('academicId');
        const answerInput = document.getElementById('answer');
        const sendBtn = document.getElementById('sendBtn');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        
        let targetDate = null;
        let countdownInterval = null;
        let isExpired = false;

        // دالة initTimer معدلة للـ WebView - تستخدم دائماً الوقت الجديد
        function initTimer() {
            // نمسح أي بيانات قديمة
            localStorage.removeItem('quizTargetDate');
            localStorage.removeItem('quizExpired');
            
            // نستخدم دائماً الوقت الجديد من الكود
            const now = new Date();
            targetDate = new Date(now.getTime() + 
                (TIMER_DAYS * 24 * 60 * 60 * 1000) + 
                (TIMER_HOURS * 60 * 60 * 1000) + 
                (TIMER_MINUTES * 60 * 1000)
            );
            
            // إذا كان الوقت صفراً، ننهي الامتحان مباشرة
            if (TIMER_DAYS === 0 && TIMER_HOURS === 0 && TIMER_MINUTES === 0) {
                expireQuiz();
                return;
            }
            
            startCountdown();
        }

        function startCountdown() {
            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        function updateCountdown() {
            if (!targetDate) return;
            
            const now = new Date();
            const difference = targetDate - now;

            if (difference <= 0) {
                expireQuiz();
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('countdown').textContent = 
                `${String(days).padStart(2, '0')}:${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function expireQuiz() {
            isExpired = true;
            clearInterval(countdownInterval);
            
            document.getElementById('countdown').textContent = "00:00:00:00";
            
            academicIdInput.disabled = true;
            answerInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.textContent = "انتهت الفترة ⛔";
            
            document.getElementById('answerForm').style.display = 'none';
            document.getElementById('timerDisplay').style.display = 'none';
            document.getElementById('expiredMessage').classList.add('show');
        }

        sendBtn.addEventListener('click', () => {
            if (isExpired) return;
            
            const academicId = academicIdInput.value;
            const answer = answerInput.value;
            
            if(!academicId || !answer){ 
                errorMsg.textContent = "يرجى ملء جميع الحقول";
                errorMsg.classList.add('show');
                return; 
            }

            // الرقم الأكاديمي بين علامات ` ليكون قابلاً للنسخ
            const telegramMessage = `📚 إجابة جديدة:

🆔 الرقم الأكاديمي: \`${academicId}\`
✅ الجواب: ${answer}
🕐 الوقت: ${new Date().toLocaleString('ar-SA')}`;

            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chat_id: TELEGRAM_CHAT_ID, 
                    text: telegramMessage,
                    parse_mode: "Markdown"
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.ok){
                    successMsg.textContent = "✅ تم إرسال إجابتك بنجاح! سيتم مراجعتها لاحقاً.";
                    successMsg.classList.add('show');
                    errorMsg.classList.remove('show');
                    academicIdInput.value = '';
                    answerInput.value = '';
                } else {
                    errorMsg.textContent = "❌ حدث خطأ: " + (data.description || "فشل في الإرسال");
                    errorMsg.classList.add('show');
                    console.error(data);
                }
            })
            .catch(err => {
                errorMsg.textContent = "❌ خطأ في الاتصال";
                errorMsg.classList.add('show');
                console.error(err);
            });
        });

        window.onload = initTimer;
    </script>
</body>
</html>

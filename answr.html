<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6366f1">
<title>مصحح الاختبارات Pro</title>

<style>
:root {
  /* Light Theme */
  --bg: #f8fafc;
  --surface: #ffffff;
  --surface-2: #f1f5f9;
  --text: #0f172a;
  --text-2: #475569;
  --text-3: #94a3b8;
  --primary: #6366f1;
  --primary-light: #818cf8;
  --primary-dark: #4f46e5;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --info: #0ea5e9;
  --border: #e2e8f0;
  --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
}

[data-theme="dark"] {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface-2: #334155;
  --text: #f8fafc;
  --text-2: #cbd5e1;
  --text-3: #64748b;
  --border: #334155;
  --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.3);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
  line-height: 1.5;
}

/* App Container */
.app {
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-lg);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  backdrop-filter: blur(10px);
}

.logo-text h1 {
  font-size: 18px;
  font-weight: 800;
  color: white;
  letter-spacing: -0.5px;
}

.logo-text p {
  font-size: 11px;
  color: rgba(255,255,255,0.8);
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
}

.icon-btn:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.05);
}

/* Progress Bar */
.progress-bar {
  display: flex;
  gap: 4px;
}

.progress-step {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 2px;
  transition: all 0.3s;
}

.progress-step.active {
  background: white;
  box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

.progress-step.completed {
  background: var(--success);
}

/* Content */
.content {
  padding: 16px;
}

/* Section */
.section {
  margin-bottom: 20px;
}

.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 12px;
}

.card-compact {
  padding: 12px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.badge {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--surface-2);
  color: var(--text-2);
}

.badge-primary {
  background: var(--primary);
  color: white;
}

.badge-success {
  background: var(--success);
  color: white;
}

/* Chips */
.chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.chip {
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.2s;
}

.chip:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.chip.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  box-shadow: var(--shadow-md);
}

/* Question Config */
.q-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 4px;
}

.q-item {
  background: var(--surface-2);
  border-radius: var(--radius);
  padding: 12px;
  border: 1.5px solid transparent;
  transition: all 0.2s;
}

.q-item:hover {
  border-color: var(--primary-light);
}

.q-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.q-num {
  width: 28px;
  height: 28px;
  background: var(--primary);
  color: white;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}

.q-type-toggle {
  display: flex;
  gap: 4px;
  background: var(--surface);
  padding: 3px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

.toggle-btn {
  padding: 6px 12px;
  border: none;
  background: transparent;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  cursor: pointer;
  transition: all 0.2s;
}

.toggle-btn.active {
  background: var(--primary);
  color: white;
}

/* Answer Options */
.ans-options {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.ans-options.binary {
  grid-template-columns: repeat(2, 1fr);
}

.ans-btn {
  padding: 10px 4px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  color: var(--text-2);
}

.ans-btn:hover {
  border-color: var(--primary-light);
  transform: translateY(-1px);
}

.ans-btn.selected {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  box-shadow: var(--shadow-md);
  transform: scale(1.02);
}

/* Quick Actions */
.quick-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.quick-btn {
  flex: 1;
  padding: 10px;
  border: 1.5px dashed var(--border);
  background: var(--surface-2);
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.quick-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  border-style: solid;
}

/* Student List */
.students-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 380px;
  overflow-y: auto;
}

.st-item {
  background: var(--surface-2);
  border-radius: var(--radius);
  padding: 12px;
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 12px;
  align-items: center;
}

.st-num {
  width: 32px;
  height: 32px;
  background: var(--primary);
  color: white;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
}

.st-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.st-type {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 600;
}

.st-answer {
  font-size: 12px;
  color: var(--text-2);
}

.st-inputs {
  display: flex;
  gap: 4px;
}

.st-btn {
  min-width: 36px;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-2);
}

.st-btn:hover {
  border-color: var(--primary-light);
}

.st-btn.selected {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

.st-btn.correct {
  background: var(--success);
  border-color: var(--success);
  color: white;
  position: relative;
}

.st-btn.correct::after {
  content: '•';
  position: absolute;
  top: -2px;
  right: 2px;
  font-size: 8px;
}

/* Buttons */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 12px;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: var(--shadow-md);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.btn-success {
  background: linear-gradient(135deg, var(--success), #059669);
  color: white;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
}

.btn-secondary {
  background: var(--surface-2);
  color: var(--text-2);
  border: 1.5px solid var(--border);
}

.btn-accent {
  background: linear-gradient(135deg, var(--info), #0284c7);
  color: white;
  box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
}

.btn-row {
  display: flex;
  gap: 10px;
}

.btn-row .btn {
  flex: 1;
  margin-top: 0;
}

/* Results */
.result-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 20px;
  text-align: center;
  box-shadow: var(--shadow-lg);
  border: 2px solid var(--success);
  margin-bottom: 12px;
}

.score-circle {
  width: 120px;
  height: 120px;
  margin: 0 auto 16px;
  border-radius: 50%;
  background: conic-gradient(var(--success) var(--score-deg), var(--surface-2) 0);
  padding: 6px;
}

.score-inner {
  width: 100%;
  height: 100%;
  background: var(--surface);
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
}

.score-value {
  font-size: 40px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}

.score-label {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 2px;
}

.score-percent {
  font-size: 24px;
  font-weight: 700;
  color: var(--success);
  margin-top: 4px;
}

.result-title {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 4px;
}

.result-msg {
  font-size: 13px;
  color: var(--text-2);
  margin-bottom: 16px;
}

/* Mini Stats */
.mini-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.mini-stat {
  background: var(--surface-2);
  padding: 12px;
  border-radius: var(--radius);
  text-align: center;
}

.mini-val {
  font-size: 22px;
  font-weight: 800;
  line-height: 1;
}

.mini-val.correct { color: var(--success); }
.mini-val.wrong { color: var(--danger); }
.mini-val.empty { color: var(--warning); }

.mini-label {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 4px;
}

/* Details Table */
.details-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.details-header {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.details-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 280px;
  overflow-y: auto;
}

.detail-row {
  display: grid;
  grid-template-columns: 32px 60px 1fr 1fr 28px;
  gap: 8px;
  align-items: center;
  padding: 10px;
  background: var(--surface-2);
  border-radius: var(--radius-sm);
  font-size: 13px;
}

.detail-row.header {
  background: transparent;
  padding: 6px 10px;
  font-weight: 700;
  color: var(--text-3);
  font-size: 11px;
}

.detail-num {
  font-weight: 700;
  color: var(--text-3);
  text-align: center;
}

.detail-type {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  text-align: center;
  font-weight: 600;
}

.detail-type.mc { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
.detail-type.tf { background: rgba(16, 185, 129, 0.1); color: var(--success); }

.detail-ans {
  text-align: center;
  padding: 6px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 12px;
}

.detail-ans.model {
  background: rgba(99, 102, 241, 0.1);
  color: var(--primary);
}

.detail-ans.st {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text);
}

.detail-ans.st.correct {
  background: rgba(16, 185, 129, 0.15);
  border-color: var(--success);
  color: var(--success);
}

.detail-ans.st.wrong {
  background: rgba(239, 68, 68, 0.15);
  border-color: var(--danger);
  color: var(--danger);
}

.detail-ans.st.empty {
  background: rgba(245, 158, 11, 0.15);
  border-color: var(--warning);
  color: var(--warning);
}

.detail-icon {
  text-align: center;
  font-size: 16px;
}

/* New Student Button */
.new-student-banner {
  background: linear-gradient(135deg, var(--info), #0284c7);
  color: white;
  padding: 16px;
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow-md);
}

.new-student-text h4 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 2px;
}

.new-student-text p {
  font-size: 12px;
  opacity: 0.9;
}

.btn-new-student {
  padding: 10px 16px;
  background: rgba(255,255,255,0.2);
  border: 1.5px solid rgba(255,255,255,0.3);
  color: white;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-new-student:hover {
  background: white;
  color: var(--info);
}

/* Hidden */
.hidden {
  display: none !important;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: white;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s;
  box-shadow: var(--shadow-lg);
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--primary-light);
  border-radius: 2px;
}

/* Animations */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in {
  animation: slideUp 0.3s ease;
}

/* Confetti */
.confetti {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
}

/* Responsive */
@media (max-width: 380px) {
  .ans-options {
    grid-template-columns: repeat(4, 1fr);
  }
  
  .st-item {
    grid-template-columns: 32px 1fr;
  }
  
  .st-inputs {
    grid-column: 1 / -1;
    justify-content: flex-end;
  }
  
  .detail-row {
    grid-template-columns: 28px 1fr 1fr 24px;
  }
  
  .detail-type { display: none; }
}
</style>
</head>

<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📝</div>
        <div class="logo-text">
          <h1>مصحح الاختبارات</h1>
          <p>Pro - سريع وذكي</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <button class="icon-btn" onclick="showHelp()">❓</button>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-step active" id="prog1"></div>
      <div class="progress-step" id="prog2"></div>
      <div class="progress-step" id="prog3"></div>
    </div>
  </header>

  <main class="content">

    <!-- STEP 1: Configure -->
    <section id="step1" class="section">
      <div class="section-title">⚙️ إعداد الاختبار</div>
      
      <div class="card card-compact">
        <div class="card-header">
          <div class="card-title">عدد الأسئلة</div>
          <span class="badge" id="configBadge">0/10</span>
        </div>
        <div class="chips" id="countChips">
          <button class="chip" onclick="setCount(5, this)">5</button>
          <button class="chip active" onclick="setCount(10, this)">10</button>
          <button class="chip" onclick="setCount(15, this)">15</button>
          <button class="chip" onclick="setCount(20, this)">20</button>
          <button class="chip" onclick="setCount(25, this)">25</button>
          <button class="chip" onclick="setCount(30, this)">30</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">تكوين الأسئلة</div>
        </div>
        
        <div class="quick-actions">
          <button class="quick-btn" onclick="setAllType('mc')">الكل اختياري</button>
          <button class="quick-btn" onclick="setAllType('tf')">الكل صح/خطأ</button>
          <button class="quick-btn" onclick="alternateTypes()">تناوب</button>
        </div>

        <div class="q-list" id="qList"></div>
        
        <button class="btn btn-primary" onclick="goToStep2()" id="btnStep1">
          <span>✓</span>
          حفظ الاختبار
        </button>
      </div>
    </section>

    <!-- STEP 2: Student Answers -->
    <section id="step2" class="section hidden">
      
      <!-- New Student Banner -->
      <div class="new-student-banner" id="newStudentBanner" style="display: none;">
        <div class="new-student-text">
          <h4>🎉 اختبار جاهز!</h4>
          <p>يمكنك تصحيح طالب آخر فوراً</p>
        </div>
        <button class="btn-new-student" onclick="newStudent()">
          <span>👤</span>
          <span>طالب جديد</span>
        </button>
      </div>

      <div class="section-title">✏️ إجابات الطالب</div>
      
      <div class="card">
        <div class="card-header">
          <div class="card-title">أدخل الإجابات</div>
          <span class="badge badge-primary" id="studentBadge">0/10</span>
        </div>
        
        <div class="students-list" id="studentsList"></div>
        
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="backToStep1()">
            <span>←</span>
            تعديل
          </button>
          <button class="btn btn-success" onclick="calculateResults()" id="btnStep2" disabled>
            <span>⚡</span>
            احسب
          </button>
        </div>
      </div>
    </section>

    <!-- STEP 3: Results -->
    <section id="step3" class="section hidden">
      <div class="section-title">📊 النتيجة</div>
      
      <div class="result-card animate-in">
        <div class="score-circle" id="scoreCircle">
          <div class="score-inner">
            <div class="score-value" id="scoreValue">0</div>
            <div class="score-label">من <span id="scoreTotal">10</span></div>
          </div>
        </div>
        <div class="score-percent" id="scorePercent">0%</div>
        
        <div class="result-title" id="resultTitle">-</div>
        <div class="result-msg" id="resultMsg">-</div>
        
        <div class="mini-stats">
          <div class="mini-stat">
            <div class="mini-val correct" id="statCorrect">0</div>
            <div class="mini-label">صحيحة ✓</div>
          </div>
          <div class="mini-stat">
            <div class="mini-val wrong" id="statWrong">0</div>
            <div class="mini-label">خاطئة ✗</div>
          </div>
          <div class="mini-stat">
            <div class="mini-val empty" id="statEmpty">0</div>
            <div class="mini-label">فارغة ○</div>
          </div>
        </div>
      </div>

      <div class="card details-card">
        <div class="details-header">
          <span>📋</span>
          تفاصيل التصحيح
        </div>
        <div class="details-list" id="detailsList"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="resetAll()">
          <span>🔄</span>
          جديد
        </button>
        <button class="btn btn-accent" onclick="newStudent()">
          <span>👤</span>
          طالب جديد
        </button>
        <button class="btn btn-success" onclick="shareResult()">
          <span>📤</span>
          مشاركة
        </button>
      </div>
    </section>

  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// State
const state = {
  count: 10,
  questions: [],
  studentAnswers: [],
  currentStep: 1,
  isConfigured: false,
  theme: localStorage.getItem('theme') || 'light'
};

// Init
document.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  initQuestions();
});

// Theme
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeBtn').textContent = state.theme === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', state.theme);
  applyTheme();
  showToast(state.theme === 'dark' ? 'الوضع الليلي ✓' : 'الوضع النهاري ✓');
}

// Set count
function setCount(n, btn) {
  state.count = n;
  document.querySelectorAll('#countChips .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  initQuestions();
  showToast(`${n} سؤال`);
}

// Init questions
function initQuestions() {
  state.questions = Array.from({length: state.count}, (_, i) => ({
    num: i + 1,
    type: 'mc',
    answer: null
  }));
  renderQList();
}

// Render question list
function renderQList() {
  const list = document.getElementById('qList');
  list.innerHTML = '';
  let done = 0;

  state.questions.forEach((q, i) => {
    const item = document.createElement('div');
    item.className = 'q-item';
    item.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.num}</div>
        <div class="q-type-toggle">
          <button class="toggle-btn ${q.type === 'mc' ? 'active' : ''}" onclick="setType(${i}, 'mc')">اختياري</button>
          <button class="toggle-btn ${q.type === 'tf' ? 'active' : ''}" onclick="setType(${i}, 'tf')">صح/خطأ</button>
        </div>
      </div>
      <div class="ans-options ${q.type === 'tf' ? 'binary' : ''}">
        ${getOptions(i, q)}
      </div>
    `;
    list.appendChild(item);
    if (q.answer) done++;
  });

  document.getElementById('configBadge').textContent = `${done}/${state.count}`;
}

function getOptions(idx, q) {
  if (q.type === 'tf') {
    return [
      {v: 'صح', l: '✓ صح'},
      {v: 'خطأ', l: '✗ خطأ'}
    ].map(o => `
      <button class="ans-btn ${q.answer === o.v ? 'selected' : ''}" onclick="setAnswer(${idx}, '${o.v}')">${o.l}</button>
    `).join('');
  }
  return ['A','B','C','D'].map(l => `
    <button class="ans-btn ${q.answer === l ? 'selected' : ''}" onclick="setAnswer(${idx}, '${l}')">${l}</button>
  `).join('');
}

function setType(idx, type) {
  state.questions[idx].type = type;
  state.questions[idx].answer = null;
  renderQList();
}

function setAnswer(idx, ans) {
  state.questions[idx].answer = ans;
  renderQList();
  // Auto advance
  if (idx < state.count - 1) {
    setTimeout(() => {
      document.querySelectorAll('.q-item')[idx + 1]?.scrollIntoView({behavior: 'smooth', block: 'nearest'});
    }, 100);
  }
}

// Quick setup
function setAllType(type) {
  state.questions.forEach(q => { q.type = type; q.answer = null; });
  renderQList();
  showToast(type === 'mc' ? 'الكل اختياري' : 'الكل صح/خطأ');
}

function alternateTypes() {
  state.questions.forEach((q, i) => { q.type = i % 2 ? 'tf' : 'mc'; q.answer = null; });
  renderQList();
  showToast('تناوب بين الأنواع');
}

// Navigation
function goToStep2() {
  const missing = state.questions.filter(q => !q.answer).length;
  if (missing && !confirm(`${missing} بدون إجابة، متابعة؟`)) return;
  
  state.isConfigured = true;
  state.currentStep = 2;
  updateProgress();
  
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
  
  // Show new student banner if coming from results
  if (state.studentAnswers.length > 0) {
    document.getElementById('newStudentBanner').style.display = 'flex';
  }
  
  renderStudents();
}

function backToStep1() {
  state.currentStep = 1;
  updateProgress();
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('newStudentBanner').style.display = 'none';
}

function updateProgress() {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById(`prog${i}`);
    el.classList.remove('active', 'completed');
    if (i < state.currentStep) el.classList.add('completed');
    else if (i === state.currentStep) el.classList.add('active');
  }
}

// Render students
function renderStudents() {
  const list = document.getElementById('studentsList');
  list.innerHTML = '';
  let answered = 0;

  state.questions.forEach((q, i) => {
    const stAns = state.studentAnswers[i];
    const isCorrect = stAns && stAns === q.answer;
    
    const item = document.createElement('div');
    item.className = 'st-item';
    item.innerHTML = `
      <div class="st-num">${q.num}</div>
      <div class="st-info">
        <div class="st-type">${q.type === 'mc' ? '🔠 اختياري' : '✓ صح/خطأ'}</div>
        <div class="st-answer">الصحيحة: <b>${q.answer}</b></div>
      </div>
      <div class="st-inputs">
        ${getStudentInputs(i, q, stAns, isCorrect)}
      </div>
    `;
    list.appendChild(item);
    if (stAns) answered++;
  });

  document.getElementById('studentBadge').textContent = `${answered}/${state.count}`;
  document.getElementById('btnStep2').disabled = answered === 0;
}

function getStudentInputs(idx, q, current, isCorrect) {
  if (q.type === 'tf') {
    return ['صح','خطأ'].map(v => `
      <button class="st-btn ${current === v ? 'selected' : ''} ${current && v === q.answer ? 'correct' : ''}" 
              onclick="setStAnswer(${idx}, '${v}')">${v === 'صح' ? '✓' : '✗'}</button>
    `).join('');
  }
  return ['A','B','C','D'].map(l => `
    <button class="st-btn ${current === l ? 'selected' : ''} ${current && l === q.answer ? 'correct' : ''}" 
            onclick="setStAnswer(${idx}, '${l}')">${l}</button>
  `).join('');
}

function setStAnswer(idx, ans) {
  state.studentAnswers[idx] = ans;
  renderStudents();
  if (idx < state.count - 1) {
    setTimeout(() => {
      document.querySelectorAll('.st-item')[idx + 1]?.scrollIntoView({behavior: 'smooth', block: 'nearest'});
    }, 100);
  }
}

// NEW STUDENT - Quick reset for next student
function newStudent() {
  state.studentAnswers = [];
  state.currentStep = 2;
  
  // Hide results, show student input
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
  document.getElementById('newStudentBanner').style.display = 'none';
  
  updateProgress();
  renderStudents();
  showToast('👤 طالب جديد - أدخل الإجابات');
  
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Calculate results
function calculateResults() {
  let correct = 0, wrong = 0, empty = 0;
  const details = [];

  state.questions.forEach((q, i) => {
    const st = state.studentAnswers[i] || '-';
    const status = st === '-' ? 'empty' : st === q.answer ? 'correct' : 'wrong';
    
    if (status === 'correct') correct++;
    else if (status === 'wrong') wrong++;
    else empty++;
    
    details.push({num: q.num, type: q.type, model: q.answer, student: st, status});
  });

  const percent = Math.round((correct / state.count) * 100);
  showResults(correct, percent, correct, wrong, empty, details);
}

function showResults(score, percent, correct, wrong, empty, details) {
  state.currentStep = 3;
  updateProgress();
  
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step3').classList.remove('hidden');
  
  // Score circle
  document.getElementById('scoreCircle').style.setProperty('--score-deg', `${percent * 3.6}deg`);
  document.getElementById('scoreValue').textContent = score;
  document.getElementById('scoreTotal').textContent = state.count;
  document.getElementById('scorePercent').textContent = percent + '%';
  
  // Color
  const card = document.querySelector('.result-card');
  card.style.borderColor = percent >= 60 ? 'var(--success)' : 'var(--danger)';
  document.getElementById('scorePercent').style.color = percent >= 60 ? 'var(--success)' : 'var(--danger)';
  
  // Title
  const grades = [
    {min: 90, t: 'ممتاز! 🌟', m: 'أداء استثنائي'},
    {min: 75, t: 'جيد جداً 👏', m: 'أداء متميز'},
    {min: 60, t: 'مقبول 👍', m: 'نجحت في الاختبار'},
    {min: 0, t: 'يحتاج مراجعة 📚', m: 'حاول مرة أخرى'}
  ];
  const g = grades.find(x => percent >= x.min);
  document.getElementById('resultTitle').textContent = g.t;
  document.getElementById('resultMsg').textContent = g.m;
  
  // Stats
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statEmpty').textContent = empty;
  
  // Details
  const list = document.getElementById('detailsList');
  list.innerHTML = `
    <div class="detail-row header">
      <div class="detail-num">#</div>
      <div class="detail-type">النوع</div>
      <div class="detail-ans">النموذج</div>
      <div class="detail-ans">الطالب</div>
      <div class="detail-icon">✓</div>
    </div>
  `;
  
  const icons = {correct: '✓', wrong: '✗', empty: '○'};
  
  details.forEach(d => {
    list.innerHTML += `
      <div class="detail-row">
        <div class="detail-num">${d.num}</div>
        <div class="detail-type ${d.type}">${d.type === 'mc' ? 'اختياري' : 'صح/خطأ'}</div>
        <div class="detail-ans model">${d.model}</div>
        <div class="detail-ans st ${d.status}">${d.student}</div>
        <div class="detail-icon">${icons[d.status]}</div>
      </div>
    `;
  });
  
  if (percent >= 80) celebrate();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Actions
function resetAll() {
  state.questions.forEach(q => q.answer = null);
  state.studentAnswers = [];
  state.isConfigured = false;
  state.currentStep = 1;
  
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('newStudentBanner').style.display = 'none';
  
  updateProgress();
  initQuestions();
  showToast('تم إعادة الضبط');
}

function shareResult() {
  const text = `نتيجة اختبار:\n` +
    `${document.getElementById('scoreValue').textContent}/${state.count}\n` +
    `${document.getElementById('scorePercent').textContent}\n` +
    `صحيحة: ${document.getElementById('statCorrect').textContent}`;
  
  if (navigator.share) navigator.share({title: 'النتيجة', text});
  else navigator.clipboard.writeText(text).then(() => showToast('✓ تم النسخ'));
}

function showHelp() {
  alert(`📝 كيفية الاستخدام:

1️⃣ اختر عدد الأسئلة ونوع كل سؤال
2️⃣ أدخل الإجابة الصحيحة لكل سؤال
3️⃣ اضغط "حفظ الاختبار"
4️⃣ أدخل إجابات الطالب
5️⃣ اضغط "احسب" للنتيجة

💡 زر "طالب جديد" يتيح تصحيح طالب آخر بنفس الاختبار فوراً!`);
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Celebrate
function celebrate() {
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: -10px;
        width: ${Math.random() * 10 + 5}px;
        height: ${Math.random() * 10 + 5}px;
        background: ${['#6366f1','#10b981','#f59e0b','#ef4444'][Math.floor(Math.random()*4)]};
        border-radius: ${Math.random()>0.5?'50%':'0'};
        animation: fall ${Math.random()*3+2}s linear forwards;
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }, i * 30);
  }
}

const style = document.createElement('style');
style.textContent = `@keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }`;
document.head.appendChild(style);

// Prevent zoom
let lastTouch = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouch <= 300) e.preventDefault();
  lastTouch = now;
}, false);
</script>

</body>
</html>
